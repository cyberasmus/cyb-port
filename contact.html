  <header class="page-hero">
    <div class="container">
      <h1>Contact Me</h1>
      <p>Have a question?, want to Connect or Collab?, Love my face?.</p>
      <p>Jxt send me a message!.</p>
    </div>
  </header>

  <main>
    <section class="contact-section">
      <div class="container">

        <form id="contactForm" class="contact-form">

          <!-- Name -->
          <div class="form-group">
            <label for="name">Full Name</label>
            <input 
              type="text" 
              id="name" 
              placeholder="Enter your full name"
              autocomplete="name"
            />
            <p class="error-msg" id="nameError"></p>
          </div>

          <!-- Email -->
          <div class="form-group">
            <label for="email">Email Address</label>
            <input 
              type="text" 
              id="email" 
              placeholder="Enter your email address"
              autocomplete="email"
            />
            <p class="error-msg" id="emailError"></p>
          </div>

          <!-- Phone -->
          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input 
              type="text" 
              id="phone" 
              placeholder="Enter your phone number"
              autocomplete="tel"
            />
            <p class="error-msg" id="phoneError"></p>
          </div>

          <!-- Message -->
          <div class="form-group">
            <label for="message">Message</label>
            <textarea 
              id="message" 
              placeholder="Write your message here"
            ></textarea>
            <p class="error-msg" id="messageError"></p>
          </div>

          <!-- Submit -->
          <button type="submit" class="submit-btn">
            Send Message
          </button>

          <!-- Success Message -->
          <p class="form-success" id="formSuccess">
            ✅ Message sent successfully!
          </p>

        </form>
      </div>
    </section>
  </main>
